spring.application.name=transporte

# ---------------------------------------------------------------------------
# Desabilita o auto-config de DataSource: temos dois DataSources customizados
# ---------------------------------------------------------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ---------------------------------------------------------------------------
# SQL Server (somente leitura)
# ---------------------------------------------------------------------------
app.datasource.sqlserver.url=
app.datasource.sqlserver.username=
app.datasource.sqlserver.password=
app.datasource.sqlserver.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hikari do SQL Server
app.datasource.sqlserver.hikari.minimum-idle=5
app.datasource.sqlserver.hikari.max-lifetime=1740000
app.datasource.sqlserver.hikari.connection-timeout=30000
app.datasource.sqlserver.hikari.validation-timeout=5000
app.datasource.sqlserver.hikari.connection-test-query=SELECT 1
app.datasource.sqlserver.hikari.keepalive-time=600000
app.datasource.sqlserver.hikari.read-only=true

# ---------------------------------------------------------------------------
# MySQL (autenticacao / escrita)
# ---------------------------------------------------------------------------
app.datasource.mysql.url=jdbc:mysql://localhost:3306/transporte?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
app.datasource.mysql.username=Criste
app.datasource.mysql.password=gsdghdifhgidfhgfdnjghdfjhgidf
app.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver

app.datasource.mysql.hikari.minimum-idle=5
app.datasource.mysql.hikari.max-lifetime=1740000
app.datasource.mysql.hikari.connection-timeout=30000
app.datasource.mysql.hikari.validation-timeout=5000
app.datasource.mysql.hikari.connection-test-query=SELECT 1
app.datasource.mysql.hikari.keepalive-time=600000

# ---------------------------------------------------------------------------
# JPA
# ---------------------------------------------------------------------------
# As propriedades especificas de cada EntityManager sao definidas em codigo,
# mas mantemos algumas globais por conveniencia.
spring.jpa.show-sql=true

# ---------------------------------------------------------------------------

# Cache
# ---------------------------------------------------------------------------
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=1m

# ---------------------------------------------------------------------------
# SLA / Ranking
# ---------------------------------------------------------------------------
# Limite (em horas) acima do qual o ciclo e considerado vencido
app.sla.threshold-hours=72
# Janela em dias considerada na consulta SQL Server
app.sla.dias-busca=60

# ---------------------------------------------------------------------------
# Admin bootstrap (criado no startup se nao existir)
# ---------------------------------------------------------------------------
app.admin.email=admin@grupomateus.com.br
app.admin.password=admin123
app.admin.name=Administrador

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
app.jwt.secret=TestSecretKeyForJwtValidationMin256BitLengthForTests!!
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000
